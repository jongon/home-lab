server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name ha.example.com;

  ssl_certificate     /etc/letsencrypt/live/ha.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ha.example.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  include /etc/nginx/conf.d/30-security-headers.inc;

  proxy_buffering off;
  proxy_read_timeout  3600s;
  proxy_send_timeout  3600s;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location /api/websocket {
    proxy_pass http://192.168.1.10:80;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location ^~ /auth/ {
    proxy_pass http://192.168.1.10:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 60s;
    proxy_set_header Accept-Encoding "";
  }

  location / {
    proxy_pass http://192.168.1.10:80;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_set_header Accept-Encoding "";
  }
}
