server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  server_name jellyfin.example.com;

  ssl_certificate     /etc/letsencrypt/live/jellyfin.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/jellyfin.example.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  include /etc/nginx/conf.d/30-security-headers.inc;

  client_max_body_size 0;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    set $upstream http://jellyfin:8096;
    proxy_pass $upstream;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_buffering off;
    proxy_set_header Range $http_range;
    proxy_set_header If-Range $http_if_range;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  location /socket {
    set $upstream http://jellyfin:8096;
    proxy_pass $upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_buffering off;
    proxy_read_timeout 86400s;
  }
}
